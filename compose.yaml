services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: adaptive_rag
      POSTGRES_USER: adaptive_rag
      POSTGRES_PASSWORD: adaptive_rag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptive_rag -d adaptive_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - adaptive_rag_pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env.example
    environment:
      ADAPTIVE_RAG_DATABASE_URL: postgresql+psycopg://adaptive_rag:adaptive_rag@postgres:5432/adaptive_rag
    command: ["uvicorn", "adaptive_rag.api.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    profiles:
      - worker
    env_file:
      - .env.example
    environment:
      ADAPTIVE_RAG_DATABASE_URL: postgresql+psycopg://adaptive_rag:adaptive_rag@postgres:5432/adaptive_rag
    command:
      - sh
      - -c
      - |
        if [ -z "$$ADAPTIVE_RAG_WORKER_PROJECT_ID" ]; then
          echo "Set ADAPTIVE_RAG_WORKER_PROJECT_ID before starting the worker profile." >&2
          exit 2
        fi
        adaptive-rag jobs run-worker --project-id "$$ADAPTIVE_RAG_WORKER_PROJECT_ID"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  adaptive_rag_pgdata:
